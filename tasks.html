<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>KRD's Professional Task Manager</title>
<link rel="icon" href="favicon.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root{
  --bg-primary: #0a0e27;
  --bg-secondary: #0f1629;
  --bg-tertiary: #1a1f3a;
  --surface: rgba(255,255,255,0.03);
  --surface-hover: rgba(255,255,255,0.06);
  --surface-elevated: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.15);
  --text-primary: #f8fafc;
  --text-secondary: #cbd5e1;
  --text-muted: #64748b;
  --accent-blue: #3b82f6;
  --accent-blue-dark: #1e40af;
  --accent-green: #10b981;
  --accent-green-dark: #059669;
  --accent-orange: #f59e0b;
  --accent-orange-dark: #d97706;
  --accent-red: #ef4444;
  --accent-red-dark: #dc2626;
  --accent-purple: #8b5cf6;
  --accent-purple-dark: #7c3aed;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.1);
  --shadow-md: 0 8px 25px rgba(0,0,0,0.15);
  --shadow-lg: 0 16px 40px rgba(0,0,0,0.2);
  --shadow-xl: 0 25px 60px rgba(0,0,0,0.25);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
  min-height: 100vh;
}

/* Enhanced background with animated gradients */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -2;
  background: 
    radial-gradient(circle at 20% 80%, rgba(59,130,246,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(139,92,246,0.06) 0%, transparent 50%),
    radial-gradient(circle at 40% 40%, rgba(16,185,129,0.04) 0%, transparent 50%);
  animation: gradientShift 20s ease-in-out infinite alternate;
}

@keyframes gradientShift {
  0% { transform: scale(1) rotate(0deg); }
  50% { transform: scale(1.05) rotate(1deg); }
  100% { transform: scale(1.02) rotate(-1deg); }
}

/* Professional starfield */
.bg-stars {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  opacity: 0.6;
}

.star {
  position: absolute;
  background: var(--text-primary);
  border-radius: 50%;
  opacity: 0.4;
  animation: twinkle 3s ease-in-out infinite alternate;
}

@keyframes twinkle {
  0% { opacity: 0.2; transform: scale(0.8); }
  100% { opacity: 0.8; transform: scale(1.2); }
}

/* Layout */
.app-container {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 24px;
  max-width: 1400px;
  margin: 0 auto;
}

/* Header */
.header {
  background: var(--surface);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px 32px;
  margin-bottom: 32px;
  box-shadow: var(--shadow-md);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  box-shadow: var(--shadow-sm);
}

.app-title {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.app-subtitle {
  font-size: 14px;
  color: var(--text-muted);
  font-weight: 500;
}

.header-stats {
  display: flex;
  gap: 24px;
  align-items: center;
}

.stat-item {
  text-align: center;
  padding: 8px 16px;
  background: var(--surface);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}

.stat-number {
  font-size: 20px;
  font-weight: 700;
  color: var(--accent-blue);
  display: block;
}

.stat-label {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.logout-btn {
  background: linear-gradient(135deg, var(--accent-red), var(--accent-red-dark));
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: var(--shadow-sm);
  display: flex;
  align-items: center;
  gap: 8px;
}

.logout-btn:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

/* Main content */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* Controls section */
.controls-section {
  background: var(--surface);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  box-shadow: var(--shadow-md);
}

.section-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.filters-row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
  align-items: center;
}
.add-task-row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr auto;
  gap: 16px;
  align-items: center;
}

/* Form elements */
.form-input, .form-select {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text-primary);
  font-size: 14px;
  font-family: inherit;
  transition: var(--transition);
  backdrop-filter: blur(10px);
}

.form-input:focus, .form-select:focus {
  outline: none;
  border-color: var(--accent-blue);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
  background: var(--surface-hover);
}

.form-input::placeholder {
  color: var(--text-muted);
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-blue-dark));
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: var(--shadow-sm);
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

/* Tasks section */
.tasks-section {
  background: var(--surface);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  box-shadow: var(--shadow-md);
  flex: 1;
}

.tasks-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 16px;
}

.view-toggle {
  display: flex;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 4px;
}

.view-btn {
  padding: 8px 16px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 4px;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}

.view-btn.active {
  background: var(--accent-blue);
  color: white;
  box-shadow: var(--shadow-sm);
}

/* Table styles */
.tasks-table {
  width: 100%;
  border-collapse: collapse;
  border-radius: var(--radius-md);
  overflow: visible;
  box-shadow: var(--shadow-sm);
  background: var(--surface-elevated);
}

.tasks-table th {
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  font-weight: 600;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 16px 20px;
  text-align: left;
  border-bottom: 2px solid var(--border);
}

.tasks-table td {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

.task-row {
  transition: var(--transition);
  cursor: pointer;
}

.task-row:hover {
  background: var(--surface-hover);
  transform: translateY(-1px);
}

.task-row.completed {
  opacity: 0.6;
}

/* Task details with enhanced tooltip */
.task-title-wrap {
  position: relative;
  display: flex;
  align-items: center;
  gap: 12px;
}

.task-title {
  font-weight: 500;
  color: var(--text-primary);
  transition: var(--transition);
}

.task-title.completed {
  text-decoration: line-through;
  color: var(--text-muted);
}

/* ── Timing drawer row (replaces hover tooltip) ── */
.timing-drawer-row > td {
  padding: 0 !important;
  border-bottom: none !important;
}
.timing-drawer-inner {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.24s cubic-bezier(0.4,0,0.2,1);
}
.timing-drawer-row.open .timing-drawer-inner {
  grid-template-rows: 1fr;
}
.timing-drawer-body { overflow: hidden; }
.timing-drawer-content {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 10px 24px 12px 24px;
  background: linear-gradient(135deg,rgba(139,92,246,0.06),rgba(59,130,246,0.03));
  border-top: 1px solid rgba(139,92,246,0.15);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 0 32px;
}
.timing-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 4px 0;
  min-width: 200px;
}
.timing-icon {
  width: 14px;
  height: 14px;
  color: var(--accent-purple);
  flex-shrink: 0;
}
.timing-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  min-width: 68px;
}
.timing-value {
  font-size: 12px;
  color: var(--text-secondary);
  font-family: 'JetBrains Mono', monospace;
}
.timing-value.empty { color: var(--text-muted); font-style: italic; font-family: inherit; }

/* keep task-title-wrap non-positioned since tooltip is gone */
.task-title-wrap {
  position: relative;
  display: flex;
  align-items: center;
  gap: 12px;
}

/* Project with logo */
.project-cell {
  display: flex;
  align-items: center;
  gap: 10px;
}

.project-logo {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid var(--border);
}

.project-name {
  font-weight: 500;
  color: var(--text-secondary);
}

/* Priority badges */
.priority-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  min-width: 80px;
  justify-content: center;
}

.priority-high {
  background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(245,158,11,0.1));
  color: var(--accent-orange);
  border: 1px solid rgba(245,158,11,0.3);
}

.priority-medium {
  background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(16,185,129,0.1));
  color: var(--accent-green);
  border: 1px solid rgba(16,185,129,0.3);
}

.priority-low {
  background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(59,130,246,0.1));
  color: var(--accent-blue);
  border: 1px solid rgba(59,130,246,0.3);
}

/* Assigned to */
.assignee {
  display: flex;
  align-items: center;
  gap: 8px;
}

.assignee-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 12px;
  font-weight: 600;
}

.assignee-name {
  color: var(--text-secondary);
  font-weight: 500;
}

/* Custom checkbox */
.status-checkbox {
  position: relative;
  display: inline-block;
  width: 24px;
  height: 24px;
}

.status-checkbox input {
  position: absolute;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
  z-index: 2;
}

.checkbox-custom {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: 2px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
}

.checkbox-custom svg {
  width: 14px;
  height: 14px;
  opacity: 0;
  transform: scale(0.8);
  transition: var(--transition);
}

.status-checkbox input:checked + .checkbox-custom {
  background: linear-gradient(135deg, var(--accent-green), var(--accent-green-dark));
  border-color: var(--accent-green);
  box-shadow: 0 4px 12px rgba(16,185,129,0.3);
}

.status-checkbox input:checked + .checkbox-custom svg {
  opacity: 1;
  transform: scale(1);
  color: white;
}

/* Action buttons */
.actions-cell {
  text-align: center;
}

.actions-group {
  display: flex;
  gap: 8px;
  justify-content: center;
}

.action-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  cursor: pointer;
  transition: var(--transition);
  backdrop-filter: blur(10px);
}

.action-btn:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.action-btn svg {
  width: 16px;
  height: 16px;
  stroke-width: 2;
}

.action-btn.edit {
  color: var(--accent-blue);
  border-color: rgba(59,130,246,0.3);
}

.action-btn.edit:hover {
  background: rgba(59,130,246,0.1);
}

.action-btn.delete {
  color: var(--accent-red);
  border-color: rgba(239,68,68,0.3);
}

.action-btn.delete:hover {
  background: rgba(239,68,68,0.1);
}

.action-btn.save {
  color: var(--accent-green);
  border-color: rgba(16,185,129,0.3);
}

.action-btn.save:hover {
  background: rgba(16,185,129,0.1);
}

.action-btn.cancel {
  color: var(--text-muted);
}

.action-btn.cancel:hover {
  background: var(--surface-hover);
}

/* Status message */
.status-message {
  margin-top: 16px;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-weight: 500;
  text-align: center;
  transition: var(--transition);
}

.status-message.success {
  background: rgba(16,185,129,0.1);
  color: var(--accent-green);
  border: 1px solid rgba(16,185,129,0.3);
}

.status-message.error {
  background: rgba(239,68,68,0.1);
  color: var(--accent-red);
  border: 1px solid rgba(239,68,68,0.3);
}

/* Responsive design */
@media (max-width: 1024px) {
  .filters-row {
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  
  .add-task-row {
    grid-template-columns: 1fr;
    gap: 12px;
  }
}

@media (max-width: 768px) {
  .app-container {
    padding: 16px;
  }
  
  .header {
    padding: 20px;
    flex-direction: column;
    text-align: center;
  }
  
  .header-stats {
    justify-content: center;
  }
  
  .controls-section, .tasks-section {
    padding: 20px;
  }
  
  .filters-row {
    grid-template-columns: 1fr;
  }
  
  .tasks-table {
    font-size: 14px;
  }
  
  .tasks-table th,
  .tasks-table td {
    padding: 12px 16px;
  }
}

@media (max-width: 480px) {
  .app-title {
    font-size: 24px;
  }
  
  .tasks-table th,
  .tasks-table td {
    padding: 8px 12px;
    font-size: 13px;
  }
  
  .priority-badge {
    font-size: 11px;
    padding: 4px 8px;
  }
  
  .action-btn {
    width: 32px;
    height: 32px;
  }
}

/* Loading state */
.loading {
  opacity: 0.6;
  pointer-events: none;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-state svg {
  width: 64px;
  height: 64px;
  margin-bottom: 16px;
  opacity: 0.5;
}

.empty-state h3 {
  font-size: 18px;
  margin-bottom: 8px;
  color: var(--text-secondary);
}

/* Animations */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.task-row {
  animation: fadeInUp 0.3s ease-out;
}

/* Editing state */
.editing-row .form-input,
.editing-row .form-select {
  background: var(--surface-elevated);
  border-color: var(--accent-blue);
}

/* Card View Styles */
.cards-container {
  display: none;
  grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
  gap: 20px;
  padding: 8px;
}

.task-card {
  background: var(--surface-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  transition: var(--transition);
  position: relative;
  overflow: visible;
  cursor: pointer;
  animation: fadeInUp 0.3s ease-out;
}

/* Use pseudo-element for the top color bar so overflow:visible doesn't break it */

.task-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  border-color: var(--border-hover);
}

.task-card.completed {
  opacity: 0.7;
}

.task-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: var(--accent-blue);
}

.task-card.priority-high::before {
  background: linear-gradient(135deg, var(--accent-orange), var(--accent-red));
}

.task-card.priority-medium::before {
  background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
}

.task-card.priority-low::before {
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
}

.card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
}

.card-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.4;
  margin: 0;
  flex: 1;
}

.card-title.completed {
  text-decoration: line-through;
  color: var(--text-muted);
}

.card-status-checkbox {
  flex-shrink: 0;
}

.card-meta {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 16px;
}

.card-meta-row {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 14px;
}

.card-meta-icon {
  width: 16px;
  height: 16px;
  color: var(--text-muted);
  flex-shrink: 0;
}

.card-project {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
}

.card-project-logo {
  width: 20px;
  height: 20px;
  border-radius: 4px;
  object-fit: cover;
  border: 1px solid var(--border);
}

.card-project-name {
  color: var(--text-secondary);
  font-weight: 500;
}

.card-priority-badge {
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.card-assignee {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text-secondary);
}

.card-assignee-avatar {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 10px;
  font-weight: 600;
}

<script>
// Configuration and helpers
const owner = 'shadow-wolf-forge';
const repo = 'KRD-s-Task-Manager';
const tableBody = document.querySelector('#taskTable tbody');
const statusEl = document.getElementById('statusMessage');
const emptyState = document.getElementById('emptyState');
const tableContainer = document.querySelector('.table-container');

let tasks = [];
let sha = null;
let people = [];
let projects = [];
let isLoading = false;

const token = localStorage.getItem('krdSpell');
if (!token) {
  window.location.href = 'index.html';
}

// Project logos configuration
const projectLogos = {
  "Beam Suntory": "https://raw.githubusercontent.com/shadow-wolf-forge/KRD-s-Task-Manager/main/img/beams.png",
"McKinsey" : "https://raw.githubusercontent.com/shadow-wolf-forge/KRD-s-Task-Manager/main/img/mckinsey.png",
	"Carrier" : "https://raw.githubusercontent.com/shadow-wolf-forge/KRD-s-Task-Manager/main/img/carrier.jpeg",
	"Personal" : "https://raw.githubusercontent.com/shadow-wolf-forge/KRD-s-Task-Manager/main/img/personal.jpeg"
};

// Utility functions
function showStatus(message, isError = false) {
  statusEl.textContent = message;
  statusEl.className = `status-message ${isError ? 'error' : 'success'}`;
  statusEl.style.display = 'block';
  
  setTimeout(() => {
    statusEl.style.display = 'none';
  }, 3000);
}

function setLoading(loading) {
  isLoading = loading;
  document.body.classList.toggle('loading', loading);
}

function encodeContent(str) {
  return btoa(unescape(encodeURIComponent(str)));
}

function decodeContent(b64) {
  return decodeURIComponent(escape(atob(b64)));
}

function getHeaders() {
  return {
    'Authorization': 'token ' + token,
    'Accept': 'application/vnd.github+json',
    'Content-Type': 'application/json'
  };
}

function formatDateIST(dateStr) {
  if (!dateStr) return '-';
  
  const date = new Date(dateStr);
  const formatter = new Intl.DateTimeFormat('en-GB', {
    timeZone: 'Asia/Kolkata',
    weekday: 'short',
    day: '2-digit',
    month: '2-digit',
    year: 'numeric',
    hour: '2-digit',
    minute: '2-digit',
    hour12: true
  });
  
  const parts = formatter.formatToParts(date);
  const partsMap = {};
  parts.forEach(part => partsMap[part.type] = part.value);
  
  return `${partsMap.weekday}, ${partsMap.day}-${partsMap.month}-${partsMap.year} ${partsMap.hour}:${partsMap.minute} ${partsMap.dayPeriod.toLowerCase()}`;
}

// Convert ISO string to datetime-local input value (local time)
function toLocalDatetimeInput(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function getInitials(name) {
  return name
    .split(' ')
    .map(n => n[0])
    .join('')
    .toUpperCase()
    .slice(0, 2);
}

function updateStats() {
  const total = tasks.length;
  const completed = tasks.filter(t => t.done).length;
  const pending = total - completed;
  
  document.getElementById('totalTasks').textContent = total;
  document.getElementById('completedTasks').textContent = completed;
  document.getElementById('pendingTasks').textContent = pending;
}

// Data fetching functions
async function fetchProjects() {
  try {
    const url = `https://api.github.com/repos/${owner}/${repo}/contents/projects.json`;
    const res = await fetch(url, { headers: getHeaders() });
    
    if (!res.ok) throw new Error('Projects fetch failed');
    
    const data = await res.json();
    const projectsData = JSON.parse(decodeContent(data.content));
    projects = [...new Set(projectsData.map(p => p.name.trim()))].sort();
    
    updateProjectDropdowns();
  } catch (error) {
    console.error('Error fetching projects:', error);
    showStatus('Failed to load projects', true);
  }
}

async function fetchPeople() {
  try {
    const url = `https://api.github.com/repos/${owner}/${repo}/contents/people.json`;
    const res = await fetch(url, { headers: getHeaders() });
    
    if (!res.ok) throw new Error('People fetch failed');
    
    const data = await res.json();
    people = JSON.parse(decodeContent(data.content));
    
    updatePeopleDropdown();
  } catch (error) {
    console.error('Error fetching people:', error);
    showStatus('Failed to load team members', true);
  }
}

async function fetchTasks() {
  const url = `https://api.github.com/repos/${owner}/${repo}/contents/tasks.json`;
  
  setLoading(true);
  showStatus('Loading tasks...');
  
  try {
    const res = await fetch(url, { headers: getHeaders() });
    
    if (res.status === 404) {
      tasks = [];
      await saveTasks('Create tasks.json');
      return;
    }
    
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    
    const data = await res.json();
    sha = data.sha;
    tasks = JSON.parse(decodeContent(data.content));
    
    renderTasks();
    updateStats();
    showStatus('Tasks loaded successfully');
    
  } catch (error) {
    console.error('Error fetching tasks:', error);
    showStatus('Failed to load tasks: ' + error.message, true);
  } finally {
    setLoading(false);
  }
}

async function fetchSha() {
  const url = `https://api.github.com/repos/${owner}/${repo}/contents/tasks.json`;
  try {
    const res = await fetch(url, { headers: getHeaders() });
    if (!res.ok) return null;
    const data = await res.json();
    sha = data.sha;
    return sha;
  } catch (e) {
    return null;
  }
}

async function saveTasks(commitMessage = 'Update tasks') {
  const url = `https://api.github.com/repos/${owner}/${repo}/contents/tasks.json`;

  try {
    setLoading(true);

    // If we don't have a sha yet, fetch it first before attempting the PUT
    if (!sha) {
      await fetchSha();
    }

    const body = {
      message: commitMessage,
      content: encodeContent(JSON.stringify(tasks, null, 2))
    };

    if (sha) body.sha = sha;

    const res = await fetch(url, {
      method: 'PUT',
      headers: getHeaders(),
      body: JSON.stringify(body)
    });

    const data = await res.json();

    if (!res.ok) {
      if (res.status === 409 || res.status === 422) {
        // SHA is stale — re-fetch it and retry once
        await fetchSha();
        return await saveTasks(commitMessage);
      }
      throw new Error(data.message || res.status);
    }

    sha = data.content.sha;
    renderTasks();
    updateStats();
    showStatus('Changes saved successfully');

  } catch (error) {
    console.error('Error saving tasks:', error);
    showStatus('Failed to save: ' + error.message, true);
  } finally {
    setLoading(false);
  }
}

// UI Update functions
function updateProjectDropdowns() {
  // Filter dropdown
  const filterSelect = document.getElementById('filterProject');
  filterSelect.innerHTML = '<option value="">All Projects</option>' +
    projects.map(p => `<option value="${p.toLowerCase()}">${p}</option>`).join('');
  
  // Add task dropdown
  const newProjectSelect = document.getElementById('newProject');
  newProjectSelect.innerHTML = projects.map(p => 
    `<option value="${p}">${p}</option>`
  ).join('');
}

function updatePeopleDropdown() {
  const select = document.getElementById('newAssignedTo');
  select.innerHTML = people.map(p => 
    `<option value="${p.name}">${p.name}</option>`
  ).join('');
  
    const assigneeFilter = document.getElementById('filterAssignedTo');
  assigneeFilter.innerHTML = '<option value="">All Assignees</option>' +
    people
      .map(p => `<option value="${p.name}">${p.name}</option>`)
      .join('');
}

function updateAssignedToFilter() {
  const assigneeFilter = document.getElementById('filterAssignedTo');
  const fromTasks = [...new Set(tasks.map(t => (t.assigned_to || '').trim()).filter(Boolean))];
  const fromPeople = people.map(p => (p.name || '').trim()).filter(Boolean);
  const assignees = [...new Set([...fromPeople, ...fromTasks])]
    .sort((a, b) => a.localeCompare(b));

  const current = assigneeFilter.value; // preserve selection
  assigneeFilter.innerHTML = '<option value="">All Assignees</option>' +
    assignees.map(name => `<option value="${name}">${name}</option>`).join('');
  // restore selection if still present
  if (assignees.map(n => n.toLowerCase()).includes(current.trim().toLowerCase())) {
    assigneeFilter.value = assignees.find(n => n.toLowerCase() === current.trim().toLowerCase());
  } else {
    // leave as is or clear; optional
  }
}

// Rendering functions
function renderTable() {
  const titleFilter = document.getElementById('filterTitle').value.toLowerCase();
  const projectFilter = document.getElementById('filterProject').value;
  const priorityFilter = document.getElementById('filterPriority').value;
  const statusFilter = document.getElementById('filterStatus').value;
const assigneeFilter = document.getElementById('filterAssignedTo').value.trim().toLowerCase();
// ...


  
  const priorityWeight = { 'High': 3, 'Medium': 2, 'Low': 1 };
  
  const filteredTasks = tasks
    .filter(task => 
      task.title.toLowerCase().includes(titleFilter) &&
      (!projectFilter || task.project.toLowerCase() === projectFilter) &&
      (!priorityFilter || task.priority === priorityFilter) &&
      (!statusFilter || (statusFilter === 'completed' ? !!task.done : !task.done)) &&
	(!assigneeFilter || (task.assigned_to || '').trim().toLowerCase() === assigneeFilter)
    )
    .sort((a, b) => {
      // Sort by completion status first, then by priority
      if (a.done !== b.done) return a.done ? 1 : -1;
      return (priorityWeight[b.priority] || 0) - (priorityWeight[a.priority] || 0);
    });
  
  tableBody.innerHTML = '';
  
  if (filteredTasks.length === 0) {
    document.getElementById('taskTable').style.display = 'none';
    emptyState.style.display = 'block';
    return;
  }
  
  document.getElementById('taskTable').style.display = 'table';
  emptyState.style.display = 'none';
  
  filteredTasks.forEach(task => {
    const row = createTaskRow(task);
    tableBody.appendChild(row);
    // Notes drawer — hidden slide-down, inserted right after the task row
    const notesDrawer = createNotesDrawerRow(task, row);
    tableBody.appendChild(notesDrawer);
    // Timing drawer — hover-triggered, right after notes drawer
    const timingDrawer = createTimingDrawerRow(task, row);
    tableBody.appendChild(timingDrawer);
  });
  
  // Re-initialize Lucide icons
  if (window.lucide) {
    lucide.createIcons();
  }
}

function createTaskRow(task) {
  // Ensure new fields exist on old tasks
  if (task.reminder_enabled === undefined) task.reminder_enabled = false;
  if (task.remind_at === undefined) task.remind_at = null;
  if (task.reminder_sent === undefined) task.reminder_sent = false;
  if (task.notes === undefined) task.notes = '';

  const row = document.createElement('tr');
  row.className = `task-row ${task.done ? 'completed' : ''}`;
  
  // Task details with tooltip
  const titleCell = document.createElement('td');
  const titleWrap = document.createElement('div');
  titleWrap.className = 'task-title-wrap';
  
  const titleText = document.createElement('div');
  titleText.className = `task-title ${task.done ? 'completed' : ''}`;
  titleText.textContent = task.title;
  
  // Reminder badge inline with title
  const titleLineWrap = document.createElement('div');
  titleLineWrap.style.cssText = 'display:flex;flex-direction:column;gap:5px;';
  titleLineWrap.appendChild(titleText);
  if (task.reminder_enabled && task.remind_at) {
    const rb = document.createElement('span');
    rb.className = 'reminder-badge';
    rb.innerHTML = `<i data-lucide="bell" style="width:11px;height:11px;"></i> ${formatDateIST(task.remind_at)}`;
    titleLineWrap.appendChild(rb);
  }

  titleWrap.appendChild(titleLineWrap);
  titleCell.appendChild(titleWrap);
  row.appendChild(titleCell);

  // Hover on the row opens the timing drawer
  let hoverTimer = null;
  row.addEventListener('mouseenter', () => {
    hoverTimer = setTimeout(() => openTimingDrawer(row, task), 180);
  });
  row.addEventListener('mouseleave', (e) => {
    clearTimeout(hoverTimer);
    // Keep open if moving into the timing drawer row itself
    const to = e.relatedTarget;
    const timingDr = getTimingDrawer(row);
    if (timingDr && timingDr.contains(to)) return;
    closeTimingDrawer(row);
  });

  // Notes cell — just a button; the drawer is a sibling <tr> below
  const notesTd = document.createElement('td');
  notesTd.style.cssText = 'text-align:center;vertical-align:middle;padding:8px 4px;';
  const notesBtn = document.createElement('button');
  notesBtn.className = `action-btn notes${task.notes ? ' has-notes' : ''}`;
  notesBtn.title = task.notes ? 'View / edit notes' : 'Add notes';
  notesBtn.innerHTML = '<i data-lucide="sticky-note"></i>';
  notesBtn.onclick = (e) => { e.stopPropagation(); toggleNotesDrawer(row, task, notesBtn); };
  notesTd.appendChild(notesBtn);
  row.appendChild(notesTd);
  
  // Project with logo
  const projectCell = document.createElement('td');
  const projectDiv = document.createElement('div');
  projectDiv.className = 'project-cell';
  
  const logoUrl = projectLogos[task.project];
  if (logoUrl) {
    const logo = document.createElement('img');
    logo.src = logoUrl;
    logo.alt = `${task.project} logo`;
    logo.className = 'project-logo';
    logo.onerror = function() { this.style.display = 'none'; };
    projectDiv.appendChild(logo);
  }
  
  const projectName = document.createElement('span');
  projectName.className = 'project-name';
  projectName.textContent = task.project;
  projectDiv.appendChild(projectName);
  
  projectCell.appendChild(projectDiv);
  row.appendChild(projectCell);
  
  // Priority badge
  const priorityCell = document.createElement('td');
  const priorityBadge = document.createElement('span');
  priorityBadge.className = `priority-badge priority-${task.priority.toLowerCase()}`;
  priorityBadge.innerHTML = `
    <i data-lucide="${task.priority === 'High' ? 'alert-circle' : task.priority === 'Medium' ? 'clock' : 'minus-circle'}"></i>
    ${task.priority}
  `;
  priorityCell.appendChild(priorityBadge);
  row.appendChild(priorityCell);
  
  // Assigned to
  const assigneeCell = document.createElement('td');
  if (task.assigned_to) {
    const assigneeDiv = document.createElement('div');
    assigneeDiv.className = 'assignee';
    
    const avatar = document.createElement('div');
    avatar.className = 'assignee-avatar';
    avatar.textContent = getInitials(task.assigned_to);
    
    const name = document.createElement('span');
    name.className = 'assignee-name';
    name.textContent = task.assigned_to;
    
    assigneeDiv.appendChild(avatar);
    assigneeDiv.appendChild(name);
    assigneeCell.appendChild(assigneeDiv);
  } else {
    assigneeCell.textContent = '-';
  }
  row.appendChild(assigneeCell);
  
  // Status checkbox
  const statusCell = document.createElement('td');
  const checkboxLabel = document.createElement('label');
  checkboxLabel.className = 'status-checkbox';
  
  const checkbox = document.createElement('input');
  checkbox.type = 'checkbox';
  checkbox.checked = !!task.done;
  checkbox.onchange = async () => {
    task.done = checkbox.checked;
    task.modified_at = new Date().toISOString();
    task.completed_at = task.done ? new Date().toISOString() : null;
    await saveTasks(`Toggle task: ${task.title}`);
  };
  
  const checkboxCustom = document.createElement('span');
  checkboxCustom.className = 'checkbox-custom';
  checkboxCustom.innerHTML = '<i data-lucide="check"></i>';
  
  checkboxLabel.appendChild(checkbox);
  checkboxLabel.appendChild(checkboxCustom);
  statusCell.appendChild(checkboxLabel);
  row.appendChild(statusCell);

  actionsCell.className = 'actions-cell';

  actionsGroup.className = 'actions-group';
  
  const editBtn = document.createElement('button');
  editBtn.className = 'action-btn edit';
  editBtn.title = 'Edit task';
  editBtn.innerHTML = '<i data-lucide="edit-3"></i>';
  editBtn.onclick = () => makeRowEditable(row, task);

  const deleteBtn = document.createElement('button');
  deleteBtn.className = 'action-btn delete';
  deleteBtn.title = 'Delete task';
  deleteBtn.innerHTML = '<i data-lucide="trash-2"></i>';
  deleteBtn.onclick = async () => {
    if (!confirm(`Are you sure you want to delete "${task.title}"?`)) return;
    
    tasks = tasks.filter(t => t.id !== task.id);
    await saveTasks(`Delete task: ${task.title}`);
  };
  
  actionsGroup.appendChild(editBtn);
  actionsGroup.appendChild(deleteBtn);
  actionsCell.appendChild(actionsGroup);
  row.appendChild(actionsCell);
  
  return row;
}

    document.getElementById('newTitle').focus();
    return;
  }
  
  if (!project) {
    showStatus('Project selection is required', true);
    return;
  }
  
  const now = new Date().toISOString();
  const newTask = {
    id: Date.now() + Math.random(),
    title,
    project,
    priority,
    assigned_to: assignedTo,
    done: false,
    reminder_enabled: reminderEnabled,
    remind_at: reminderEnabled && remindAtVal ? new Date(remindAtVal).toISOString() : null,
    reminder_sent: false,
    notes: '',
    created_at: now,
    modified_at: now,
    completed_at: null
  };
  
  tasks.push(newTask);
  
  // Clear form
  document.getElementById('newTitle').value = '';
  document.getElementById('newProject').selectedIndex = 0;
  document.getElementById('newPriority').selectedIndex = 1;
  document.getElementById('newAssignedTo').selectedIndex = 0;
  document.getElementById('newReminderEnabled').checked = false;
  document.getElementById('newRemindAt').value = '';
  document.getElementById('newRemindAt').classList.remove('active');
  
  await saveTasks(`Add new task: ${title}`);
};

// Enhanced starfield
function createStarfield() {
  const container = document.getElementById('bgStars');

  for (let i = 0; i < starCount; i++) {
    const star = document.createElement('div');
    star.className = 'star';

    star.style.height = size + 'px';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.opacity = opacity;
    star.style.animationDelay = animationDelay + 's';
    
    container.appendChild(star);
  }

// ── Notes drawer helpers ────────────────────────────────────────────────────

/** Table view: create the hidden drawer <tr> that slides down below a task row */
function createNotesDrawerRow(task, taskRow) {
  const colCount = taskRow.querySelectorAll('td').length;
  const dr = document.createElement('tr');
  dr.className = 'notes-drawer-row';
  dr.dataset.taskId = task.id;

  const td = document.createElement('td');
  td.colSpan = colCount;

  const inner = document.createElement('div');
  inner.className = 'notes-drawer-inner';

  const body = document.createElement('div');
  body.className = 'notes-drawer-body';

  const content = document.createElement('div');
  content.className = 'notes-drawer-content';

  const label = document.createElement('span');
  label.className = 'notes-drawer-label';
  label.textContent = '📝 Notes';

  const textarea = document.createElement('textarea');
  textarea.className = 'notes-textarea';
  textarea.placeholder = 'Add notes here…';
  textarea.value = task.notes || '';

  const actions = document.createElement('div');
  actions.className = 'notes-drawer-actions';

  const saveBtn = document.createElement('button');
  saveBtn.className = 'notes-save-btn';
  saveBtn.innerHTML = '<i data-lucide="save" style="width:13px;height:13px;"></i> Save';
  saveBtn.onclick = async (e) => {
    e.stopPropagation();
    task.notes = textarea.value.trim();
    task.modified_at = new Date().toISOString();
    // update button dot indicator
    const notesBtn = taskRow.querySelector('.action-btn.notes');
    if (notesBtn) notesBtn.classList.toggle('has-notes', !!task.notes);
    await saveTasks(`Notes: ${task.title}`);
    dr.classList.remove('open');
    if (window.lucide) lucide.createIcons();
  };

  const closeBtn = document.createElement('button');
  closeBtn.className = 'notes-close-btn';
  closeBtn.textContent = 'Close';
  closeBtn.onclick = (e) => { e.stopPropagation(); dr.classList.remove('open'); };

  actions.appendChild(saveBtn);
  actions.appendChild(closeBtn);
  content.appendChild(label);
  content.appendChild(textarea);
  content.appendChild(actions);
  body.appendChild(content);
  inner.appendChild(body);
  td.appendChild(inner);
  dr.appendChild(td);
  return dr;
}

/** Table view: toggle the drawer row open/closed */
function toggleNotesDrawer(taskRow, task, notesBtn) {
  // Find the drawer row that immediately follows this task row
  let dr = taskRow.nextElementSibling;
  if (!dr || !dr.classList.contains('notes-drawer-row')) return;

  const isOpen = dr.classList.contains('open');
  // Close all other open drawers first
  document.querySelectorAll('.notes-drawer-row.open').forEach(r => r.classList.remove('open'));

  if (!isOpen) {
    // Refresh textarea in case task.notes changed
    dr.querySelector('.notes-textarea').value = task.notes || '';
    dr.classList.add('open');
    dr.querySelector('.notes-textarea').focus();
    if (window.lucide) lucide.createIcons();
  }
}

/** Card view: toggle the inline notes drawer inside a card */
function toggleCardNotesDrawer(card, task, notesBtn) {
  let drawer = card.querySelector('.card-notes-drawer');
  if (!drawer) {
    // Create it the first time
    drawer = document.createElement('div');
    drawer.className = 'card-notes-drawer';

    const body = document.createElement('div');
    body.className = 'card-notes-body';

    const content = document.createElement('div');
    content.className = 'card-notes-content';

    const label = document.createElement('div');
    label.className = 'card-notes-label';
    label.textContent = '📝 Notes';

    const textarea = document.createElement('textarea');
    textarea.className = 'notes-textarea';
    textarea.placeholder = 'Add notes here…';
    textarea.value = task.notes || '';
    textarea.style.width = '100%';

    const actionsRow = document.createElement('div');
    actionsRow.className = 'card-notes-actions';

    const saveBtn = document.createElement('button');
    saveBtn.className = 'notes-save-btn';
    saveBtn.style.flex = '1';
    saveBtn.innerHTML = '<i data-lucide="save" style="width:12px;height:12px;"></i> Save';
    saveBtn.onclick = async (e) => {
      e.stopPropagation();
      task.notes = textarea.value.trim();
      task.modified_at = new Date().toISOString();
      notesBtn.classList.toggle('has-notes', !!task.notes);
      await saveTasks(`Notes: ${task.title}`);
      drawer.classList.remove('open');
      if (window.lucide) lucide.createIcons();
    };

    const closeBtn = document.createElement('button');
    closeBtn.className = 'notes-close-btn';
    closeBtn.textContent = 'Close';
    closeBtn.onclick = (e) => { e.stopPropagation(); drawer.classList.remove('open'); };

    actionsRow.appendChild(saveBtn);
    actionsRow.appendChild(closeBtn);
    content.appendChild(label);
    content.appendChild(textarea);
    content.appendChild(actionsRow);
    body.appendChild(content);
    drawer.appendChild(body);
    card.appendChild(drawer);
    if (window.lucide) lucide.createIcons();
  }

  const isOpen = drawer.classList.contains('open');
  // Close all other card drawers
  document.querySelectorAll('.card-notes-drawer.open').forEach(d => d.classList.remove('open'));
  if (!isOpen) {
    drawer.querySelector('.notes-textarea').value = task.notes || '';
    drawer.classList.add('open');
    drawer.querySelector('.notes-textarea').focus();
  }
}

async function saveNotes(task, textarea, btn, notesBtn) {
  task.notes = (textarea ? textarea.value : '').trim();
  task.modified_at = new Date().toISOString();
  if (notesBtn) notesBtn.classList.toggle('has-notes', !!task.notes);
  await saveTasks(`Notes: ${task.title}`);
}

// ── Timing drawer helpers ────────────────────────────────────────────────────

/** Get the timing drawer row for a given task row (it's 2 siblings after: notes drawer is in between) */
function getTimingDrawer(taskRow) {
  // structure: taskRow → notesDrawerRow → timingDrawerRow
  const next = taskRow.nextElementSibling;
  if (!next) return null;
  if (next.classList.contains('timing-drawer-row')) return next;
  const after = next.nextElementSibling;
  if (after && after.classList.contains('timing-drawer-row')) return after;
  return null;
}

/** Build the timing drawer <tr> for a task */
function createTimingDrawerRow(task, taskRow) {
  const colCount = taskRow.querySelectorAll('td').length;
  const dr = document.createElement('tr');
  dr.className = 'timing-drawer-row';
  dr.dataset.taskId = task.id;

  // Keep drawer open while mouse is inside it
  dr.addEventListener('mouseenter', () => {
    // cancel any pending close on the task row
    dr._staying = true;
  });
  dr.addEventListener('mouseleave', (e) => {
    dr._staying = false;
    // Close unless moving back onto the task row
    const to = e.relatedTarget;
    if (taskRow.contains(to)) return;
    dr.classList.remove('open');
  });

  const td = document.createElement('td');
  td.colSpan = colCount;

  const inner = document.createElement('div');
  inner.className = 'timing-drawer-inner';

  const body = document.createElement('div');
  body.className = 'timing-drawer-body';

  const content = document.createElement('div');
  content.className = 'timing-drawer-content';
  content.dataset.taskId = task.id; // so we can refresh it

  // helper to build one timing item
  function makeItem(iconName, label, value) {
    const item = document.createElement('div');
    item.className = 'timing-item';
    item.innerHTML = `
      <i data-lucide="${iconName}" class="timing-icon"></i>
      <span class="timing-label">${label}</span>
      <span class="timing-value${value ? '' : ' empty'}">${value || '—'}</span>
    `;
    return item;
  }

  content.appendChild(makeItem('calendar-plus', 'Created', formatDateIST(task.created_at)));
  content.appendChild(makeItem('pencil', 'Modified', formatDateIST(task.modified_at)));
  content.appendChild(makeItem('circle-check', 'Completed', formatDateIST(task.completed_at)));
  if (task.reminder_enabled && task.remind_at) {
    content.appendChild(makeItem('bell', 'Reminder', formatDateIST(task.remind_at)));
  }

  body.appendChild(content);
  inner.appendChild(body);
  td.appendChild(inner);
  dr.appendChild(td);
  return dr;
}

function openTimingDrawer(taskRow, task) {
  // Close all other timing drawers
  document.querySelectorAll('.timing-drawer-row.open').forEach(r => {
    if (r.dataset.taskId !== String(task.id)) r.classList.remove('open');
  });
  const dr = getTimingDrawer(taskRow);
  if (!dr) return;
  // Refresh values (task may have been edited)
  const content = dr.querySelector('.timing-drawer-content');
  if (content) {
    content.innerHTML = '';
    function makeItem(iconName, label, value) {
      const item = document.createElement('div');
      item.className = 'timing-item';
      item.innerHTML = `<i data-lucide="${iconName}" class="timing-icon"></i><span class="timing-label">${label}</span><span class="timing-value${value ? '' : ' empty'}">${value || '—'}</span>`;
      return item;
    }
    content.appendChild(makeItem('calendar-plus', 'Created', formatDateIST(task.created_at)));
    content.appendChild(makeItem('pencil', 'Modified', formatDateIST(task.modified_at)));
    content.appendChild(makeItem('circle-check', 'Completed', formatDateIST(task.completed_at)));
    if (task.reminder_enabled && task.remind_at) {
      content.appendChild(makeItem('bell', 'Reminder', formatDateIST(task.remind_at)));
    }
  }
  dr.classList.add('open');
  if (window.lucide) lucide.createIcons();
}

function closeTimingDrawer(taskRow) {
  const dr = getTimingDrawer(taskRow);
  if (dr && !dr._staying) dr.classList.remove('open');
}

  try {
    createStarfield();
    
    showStatus('Initializing application...');
    
    await Promise.all([
      fetchPeople(),
      fetchProjects()
    ]);
    
    await fetchTasks();
    
    // Initialize Lucide icons

      lucide.createIcons();
    }
    
  } catch (error) {
    console.error('Initialization error:', error);
    showStatus('Failed to initialize application', true);
  }
}

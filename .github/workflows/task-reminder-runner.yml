name: Task Reminder Runner

on:
  workflow_dispatch:

  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  task-reminder-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Execute Reminder Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/reminder-notifier.js

      - name: Save Updated Task Data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add tasks.json

          git diff --cached --quiet || git commit -m "Task reminder update"

          git push
